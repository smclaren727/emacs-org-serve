<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f2430">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vulpea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<link rel="stylesheet" href="app.css">
<title>Notes · Vulpea</title>
</head>
<body>
<header>
  <nav class="tabs"><a class="tab" href="./">Contacts</a><a class="tab active" href="notes.html">Notes</a><a class="tab" href="bookmarks.html">Bookmarks</a><a class="tab" href="saves.html">Saves</a><a class="tab" href="journal.html">Journal</a><a class="tab" href="tasks.html">Tasks</a></nav>
  <input id="q" type="search" placeholder="Search notes…" autocomplete="off" autocapitalize="none" autocorrect="off" enterkeyhint="search">
  <div id="count"></div>
</header>
<main id="list"><div class="msg">Loading…</div></main>
<main id="detail" style="display:none"></main>
<script src="org.js"></script>
<script>
const listView=document.getElementById('list'),detailView=document.getElementById('detail');
const qEl=document.getElementById('q'),countEl=document.getElementById('count');
let all=[];
const loc=n=>[n.file].concat(n.outline||[]).join(' › ');
const todoBadge=t=>t?`<span class="todo ${esc(t.toLowerCase())}">${esc(t)}</span> `:'';

function listItem(n){
  const tags=(n.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  return `<a class="note-item" href="#n=${encodeURIComponent(n.id)}">`
    +`<div class="note-title">${todoBadge(n.todo)}${esc(n.title)}</div>`
    +`<div class="note-loc">${esc(loc(n))}</div>`
    +(tags?`<div class="note-tags">${tags}</div>`:'')+`</a>`;
}
function renderList(items){
  listView.innerHTML=items.length?items.map(listItem).join(''):'<div class="msg">No matches</div>';
  countEl.textContent=items.length+(items.length===1?' note':' notes');
}
function applyFilter(){
  const q=qEl.value.trim().toLowerCase();
  if(!q){renderList(all);return;}
  const terms=q.split(/\s+/);
  renderList(all.filter(n=>{
    const hay=(n.title+' '+n.file+' '+(n.outline||[]).join(' ')+' '+(n.tags||[]).join(' ')+' '+(n.todo||'')).toLowerCase();
    return terms.every(t=>hay.includes(t));
  }));
}

async function showDetail(id){
  listView.style.display='none';detailView.style.display='block';
  detailView.innerHTML='<div class="msg">Loading…</div>';
  try{
    const r=await fetch('api/note?id='+encodeURIComponent(id));
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    let body=d.body||'';
    if(d.level>0)body=body.replace(/^.*\n?/,''); // drop the headline line (shown as title)
    const tags=(d.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    detailView.innerHTML=`<a class="back" href="#">‹ Notes</a>`
      +`<h1 class="detail-title">${todoBadge(d.todo)}${esc(d.title)}</h1>`
      +`<div class="note-loc">${esc(loc(d))}</div>`
      +(tags?`<div class="note-tags">${tags}</div>`:'')
      +`<article class="org">${renderOrg(body)}</article>`;
    window.scrollTo(0,0);
  }catch(e){
    detailView.innerHTML=`<a class="back" href="#">‹ Notes</a><div class="msg">Couldn’t load note.</div>`;
  }
}
function route(){
  const m=location.hash.match(/^#n=(.+)$/);
  if(m){showDetail(decodeURIComponent(m[1]));}
  else{detailView.style.display='none';listView.style.display='block';}
}
window.addEventListener('hashchange',route);
qEl.addEventListener('input',applyFilter);
fetch('api/notes').then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(ns=>{all=ns;applyFilter();route();})
  .catch(()=>{listView.innerHTML='<div class="msg">Couldn’t load notes.</div>';});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
