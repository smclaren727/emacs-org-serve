<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f2430">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vulpea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<link rel="stylesheet" href="app.css">
<title>Contacts · Vulpea</title>
</head>
<body>
<header>
  <nav class="tabs"><a class="tab active" href="index.html">Contacts</a><a class="tab" href="notes.html">Notes</a></nav>
  <input id="q" type="search" placeholder="Search contacts…" autocomplete="off" autocapitalize="none" autocorrect="off" enterkeyhint="search">
  <div id="count"></div>
</header>
<main id="list"><div class="msg">Loading…</div></main>
<script>
const listEl=document.getElementById('list'),qEl=document.getElementById('q'),countEl=document.getElementById('count');
let all=[];
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const telDigits=v=>v.replace(/[^\d+]/g,'');
const initials=n=>{const p=String(n||'').trim().split(/\s+/);return ((p[0]&&p[0][0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase()||'?';};
function chips(fields,kind){return (fields||[]).map(f=>{const href=kind==='tel'?'tel:'+telDigits(f.value):'mailto:'+encodeURIComponent(f.value);return `<a class="chip ${kind}" href="${href}"><span class="lbl">${esc(f.label)}</span>${esc(f.value)}</a>`;}).join('');}
function card(c){const has=(c.phones&&c.phones.length)||(c.emails&&c.emails.length);return `<div class="card"><div class="avatar">${esc(initials(c.name))}</div><div class="cbody"><div class="name">${esc(c.name)}</div>${c.company?`<div class="company">${esc(c.company)}</div>`:''}${has?`<div class="chips">${chips(c.phones,'tel')}${chips(c.emails,'mailto')}</div>`:''}</div></div>`;}
function render(items){if(!items.length){listEl.innerHTML='<div class="msg">No matches</div>';countEl.textContent='0 contacts';return;}listEl.innerHTML=items.map(card).join('');countEl.textContent=items.length+(items.length===1?' contact':' contacts');}
function applyFilter(){const q=qEl.value.trim().toLowerCase();if(!q){render(all);return;}const terms=q.split(/\s+/);render(all.filter(c=>{const hay=(c.name+' '+(c.company||'')+' '+(c.emails||[]).map(e=>e.value).join(' ')+' '+(c.phones||[]).map(p=>p.value).join(' ')).toLowerCase();return terms.every(t=>hay.includes(t));}));}
qEl.addEventListener('input',applyFilter);
fetch('api/contacts').then(r=>{if(!r.ok)throw 0;return r.json();}).then(cs=>{all=cs;render(all);}).catch(()=>{listEl.innerHTML='<div class="msg">Couldn’t load contacts.</div>';});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
