<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f2430">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vulpea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<link rel="stylesheet" href="app.css">
<style>.jentry{background:var(--panel);border:1px solid #333a49;border-radius:14px;padding:13px 16px}.jhead{font-size:15px}.jdate{font-weight:700;color:var(--accent)}.jday{color:var(--muted);font-weight:600;margin-left:6px}.jentry .org{margin-top:6px}.jentry .org>:first-child{margin-top:0}</style>
<title>Journal · Vulpea</title>
</head>
<body>
<header>
  <nav class="tabs"><a class="tab" href="./">Contacts</a><a class="tab" href="notes.html">Notes</a><a class="tab" href="bookmarks.html">Bookmarks</a><a class="tab" href="saves.html">Saves</a><a class="tab active" href="journal.html">Journal</a><a class="tab" href="tasks.html">Tasks</a></nav>
  <input id="q" type="search" placeholder="Search journal…" autocomplete="off" autocapitalize="none" autocorrect="off" enterkeyhint="search">
  <div id="count"></div>
</header>
<main id="list"><div class="msg">Loading…</div></main>
<script src="org.js"></script>
<script>
const listEl=document.getElementById('list'),qEl=document.getElementById('q'),countEl=document.getElementById('count');
let all=[];
function head(e){
  const m=String(e.title||e.date||'').match(/^(\S+)\s+(.*)$/); // "2026-06-05 Friday" -> date + weekday
  return m?`<span class="jdate">${esc(m[1])}</span><span class="jday">${esc(m[2])}</span>`
          :`<span class="jdate">${esc(e.title||e.date)}</span>`;
}
function entry(e){
  return `<article class="jentry"><div class="jhead">${head(e)}</div><div class="org">${renderOrg(e.body||'')}</div></article>`;
}
function render(items){
  if(!items.length){listEl.innerHTML='<div class="msg">No entries</div>';countEl.textContent='0 entries';return;}
  listEl.innerHTML=items.map(entry).join('');
  countEl.textContent=items.length+(items.length===1?' entry':' entries');
}
function applyFilter(){
  const q=qEl.value.trim().toLowerCase();
  if(!q){render(all);return;}
  const terms=q.split(/\s+/);
  render(all.filter(e=>{const hay=((e.title||'')+' '+(e.body||'')).toLowerCase();return terms.every(t=>hay.includes(t));}));
}
qEl.addEventListener('input',applyFilter);
fetch('api/journal').then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(es=>{all=es;render(all);})
  .catch(()=>{listEl.innerHTML='<div class="msg">Couldn’t load journal.</div>';});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
